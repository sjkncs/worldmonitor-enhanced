<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新功能测试 - World Monitor</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #0a0e27;
      color: #fff;
    }
    .section {
      background: #1a1f3a;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid #2a3f5f;
    }
    h1 { color: #60a5fa; }
    h2 { color: #34d399; border-bottom: 2px solid #34d399; padding-bottom: 10px; }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
      font-size: 14px;
    }
    button:hover { background: #2563eb; }
    .result {
      background: #0f172a;
      padding: 15px;
      border-radius: 5px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
    }
    .success { color: #34d399; }
    .error { color: #f87171; }
    .info { color: #60a5fa; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <h1>🚀 World Monitor 新功能测试页面</h1>
  
  <div class="section">
    <h2>1. 军事追踪功能 (完全免费)</h2>
    <button onclick="testMilitary()">测试全球军机追踪</button>
    <div id="military-result" class="result"></div>
  </div>

  <div class="section">
    <h2>2. 能源情报功能 (完全免费)</h2>
    <button onclick="testEnergy()">测试能源价格监控</button>
    <button onclick="testEnergyMonitor()">启动实时监控</button>
    <div id="energy-result" class="result"></div>
  </div>

  <div class="section">
    <h2>3. 量化交易功能</h2>
    <button onclick="testQuant()">测试情感分析</button>
    <button onclick="testTrading()">测试交易信号</button>
    <div id="quant-result" class="result"></div>
  </div>

  <div class="section">
    <h2>4. Panel组件测试</h2>
    <button onclick="testPanels()">测试所有Panel组件</button>
    <div id="panel-result" class="result"></div>
  </div>

  <script type="module">
    let energyMonitor = null;

    // 测试军事追踪
    window.testMilitary = async function() {
      const result = document.getElementById('military-result');
      result.innerHTML = '<span class="info">正在获取全球军机数据...</span>';
      
      try {
        const { fetchOpenSkyMilitary } = await import('/src/services/military-tracking.ts');
        const aircraft = await fetchOpenSkyMilitary();
        
        result.innerHTML = `
          <span class="success">✓ 成功获取军机数据</span><br>
          <strong>发现军机数量: ${aircraft.length}</strong><br><br>
          <strong>前5架军机详情:</strong>
          <pre>${JSON.stringify(aircraft.slice(0, 5), null, 2)}</pre>
        `;
      } catch (error) {
        result.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
      }
    };

    // 测试能源价格
    window.testEnergy = async function() {
      const result = document.getElementById('energy-result');
      result.innerHTML = '<span class="info">正在获取能源价格...</span>';
      
      try {
        const { fetchEnergyPricesYahoo } = await import('/src/services/energy-intelligence.ts');
        const prices = await fetchEnergyPricesYahoo();
        
        result.innerHTML = `
          <span class="success">✓ 成功获取能源价格</span><br>
          <strong>商品数量: ${prices.length}</strong><br><br>
          <pre>${JSON.stringify(prices, null, 2)}</pre>
        `;
      } catch (error) {
        result.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
      }
    };

    // 测试能源监控
    window.testEnergyMonitor = async function() {
      const result = document.getElementById('energy-result');
      result.innerHTML = '<span class="info">正在启动实时监控...</span>';
      
      try {
        const { EnergyMonitor } = await import('/src/services/energy-intelligence.ts');
        
        if (energyMonitor) {
          energyMonitor.stopMonitoring();
        }
        
        energyMonitor = new EnergyMonitor();
        await energyMonitor.startMonitoring((alert) => {
          result.innerHTML += `<br><span class="info">⚠️ 警报: ${alert.message}</span>`;
        }, 1); // 每1分钟检查
        
        result.innerHTML = `
          <span class="success">✓ 实时监控已启动 (每1分钟更新)</span><br>
          <span class="info">监控中，警报将实时显示...</span>
        `;
      } catch (error) {
        result.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
      }
    };

    // 测试量化功能
    window.testQuant = async function() {
      const result = document.getElementById('quant-result');
      result.innerHTML = '<span class="info">正在分析金融情感...</span>';
      
      try {
        const { analyzeFinancialSentiment } = await import('/src/services/quant-sentiment.ts');
        const analysis = analyzeFinancialSentiment(
          'Apple stock surges 5% on strong iPhone sales and record profits',
          'Apple releases Q4 earnings beating expectations with record revenue'
        );
        
        result.innerHTML = `
          <span class="success">✓ 情感分析完成</span><br><br>
          <pre>${JSON.stringify(analysis, null, 2)}</pre>
        `;
      } catch (error) {
        result.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
      }
    };

    // 测试交易信号
    window.testTrading = async function() {
      const result = document.getElementById('quant-result');
      result.innerHTML = '<span class="info">正在生成交易信号...</span>';
      
      try {
        const { generateTradingSignal } = await import('/src/services/trading-signal-generator.ts');
        const signal = generateTradingSignal({
          overall: 'bullish',
          dimensions: { market: 0.8, geopolitical: 0.3, economic: 0.6, urgency: 0.5 },
          confidence: 0.75,
          affectedAssets: [{ symbol: 'AAPL', impact: 8 }]
        }, 85);
        
        result.innerHTML = `
          <span class="success">✓ 交易信号生成完成</span><br><br>
          <pre>${JSON.stringify(signal, null, 2)}</pre>
        `;
      } catch (error) {
        result.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
      }
    };

    // 测试Panel组件
    window.testPanels = async function() {
      const result = document.getElementById('panel-result');
      result.innerHTML = '<span class="info">正在测试Panel组件...</span>';
      
      try {
        const { QuantTradingPanel, MilitaryTrackingPanel, EnergyIntelPanel } = 
          await import('/src/components/index.ts');
        
        // 创建测试容器
        const testDiv = document.createElement('div');
        document.body.appendChild(testDiv);
        
        const panels = {
          quant: new QuantTradingPanel(),
          military: new MilitaryTrackingPanel(),
          energy: new EnergyIntelPanel()
        };
        
        result.innerHTML = `
          <span class="success">✓ 所有Panel组件加载成功</span><br><br>
          <strong>已创建的组件:</strong><br>
          - QuantTradingPanel (量化交易面板)<br>
          - MilitaryTrackingPanel (军事追踪面板)<br>
          - EnergyIntelPanel (能源情报面板)<br><br>
          <span class="info">组件已准备就绪，可以集成到主应用</span>
        `;
        
        // 清理测试容器
        testDiv.remove();
      } catch (error) {
        result.innerHTML = `<span class="error">✗ 错误: ${error.message}<br>${error.stack}</span>`;
      }
    };

    // 页面加载时的提示
    console.log('%c🎉 新功能测试页面已加载', 'color: #34d399; font-size: 16px; font-weight: bold');
    console.log('%c点击按钮测试各项功能', 'color: #60a5fa');
  </script>
</body>
</html>
